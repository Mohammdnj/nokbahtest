# Nginx config for SSE (Server-Sent Events) support
# Add this inside your server {} block or location block

location /api/sse {
    # Pass to PHP-FPM
    fastcgi_pass unix:/run/php/php-fpm.sock;
    fastcgi_param SCRIPT_FILENAME $document_root/api/sse.php;
    include fastcgi_params;

    # Critical SSE settings - disable buffering
    fastcgi_buffering off;
    proxy_buffering off;
    chunked_transfer_encoding off;

    # Keep connection alive
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    fastcgi_read_timeout 86400s;

    # Disable gzip for SSE
    gzip off;

    # Headers
    add_header Cache-Control "no-cache";
    add_header X-Accel-Buffering "no";
}
